<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 518 600"
     width="518" height="600"
     role="img" aria-label="shewhartr hex logo">
  <title>shewhartr</title>
  <desc>Hex sticker for the shewhartr R package: a phased Shewhart control chart with three phases (calibration, shift detection, settled monitoring), each with its own centre line and limits.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EEF2F7"/>
    </linearGradient>

    <clipPath id="hexClip">
      <path d="M259 0 L518 150 L518 450 L259 600 L0 450 L0 150 Z"/>
    </clipPath>
  </defs>

  <!-- Background hex -->
  <path d="M259 0 L518 150 L518 450 L259 600 L0 450 L0 150 Z"
        fill="url(#bg)"/>

  <!-- Outer hex border, drawn inside the clip -->
  <g clip-path="url(#hexClip)">
    <path d="M259 0 L518 150 L518 450 L259 600 L0 450 L0 150 Z"
          fill="none" stroke="#0054AD" stroke-width="20"
          stroke-linejoin="miter"/>
  </g>

  <!-- Inner hex hairline -->
  <path d="M259 22 L498 161 L498 439 L259 578 L20 439 L20 161 Z"
        fill="none" stroke="#0054AD" stroke-width="1" opacity="0.25"/>

  <!-- Phase chart -->
  <g>
    <!-- Phase 1: calibration baseline (blue) -->
    <rect x="64" y="150" width="130" height="230"
          fill="#0054AD" opacity="0.06"/>
    <line x1="64"  y1="290" x2="194" y2="290"
          stroke="#0054AD" stroke-width="2.4"/>
    <line x1="64"  y1="255" x2="194" y2="255"
          stroke="#0054AD" stroke-width="2"
          stroke-dasharray="6 4" stroke-linecap="round" opacity="0.85"/>
    <line x1="64"  y1="325" x2="194" y2="325"
          stroke="#0054AD" stroke-width="2"
          stroke-dasharray="6 4" stroke-linecap="round" opacity="0.85"/>

    <!-- Phase 2: shift detected (amber) -->
    <rect x="194" y="150" width="130" height="230"
          fill="#D97706" opacity="0.06"/>
    <line x1="194" y1="240" x2="324" y2="240"
          stroke="#D97706" stroke-width="2.4"/>
    <line x1="194" y1="205" x2="324" y2="205"
          stroke="#D97706" stroke-width="2"
          stroke-dasharray="6 4" stroke-linecap="round" opacity="0.85"/>
    <line x1="194" y1="275" x2="324" y2="275"
          stroke="#D97706" stroke-width="2"
          stroke-dasharray="6 4" stroke-linecap="round" opacity="0.85"/>

    <!-- Phase 3: re-stabilised (green) -->
    <rect x="324" y="150" width="130" height="230"
          fill="#16A34A" opacity="0.07"/>
    <line x1="324" y1="200" x2="454" y2="200"
          stroke="#16A34A" stroke-width="2.4"/>
    <line x1="324" y1="165" x2="454" y2="165"
          stroke="#16A34A" stroke-width="2"
          stroke-dasharray="6 4" stroke-linecap="round" opacity="0.85"/>
    <line x1="324" y1="235" x2="454" y2="235"
          stroke="#16A34A" stroke-width="2"
          stroke-dasharray="6 4" stroke-linecap="round" opacity="0.85"/>

    <!-- Phase boundaries (thin vertical guides) -->
    <line x1="194" y1="150" x2="194" y2="380"
          stroke="#1F2937" stroke-width="0.8"
          stroke-dasharray="3 4" opacity="0.5"/>
    <line x1="324" y1="150" x2="324" y2="380"
          stroke="#1F2937" stroke-width="0.8"
          stroke-dasharray="3 4" opacity="0.5"/>

    <!-- Connecting polyline through all points -->
    <polyline
      points="84,300 117,282 150,295 183,288 220,250 253,232 286,245 319,238 350,210 383,196 416,205 443,198"
      fill="none" stroke="#1F2937"
      stroke-width="1.8" stroke-linejoin="round"
      stroke-linecap="round" opacity="0.6"/>

    <!-- Phase 1 points (blue) -->
    <g fill="#0054AD" stroke="#FFFFFF" stroke-width="1.5">
      <circle cx="84"  cy="300" r="6"/>
      <circle cx="117" cy="282" r="6"/>
      <circle cx="150" cy="295" r="6"/>
      <circle cx="183" cy="288" r="6"/>
    </g>

    <!-- Phase 2 points (amber) -->
    <g fill="#D97706" stroke="#FFFFFF" stroke-width="1.5">
      <circle cx="220" cy="250" r="6"/>
      <circle cx="253" cy="232" r="6"/>
      <circle cx="286" cy="245" r="6"/>
      <circle cx="319" cy="238" r="6"/>
    </g>

    <!-- Phase 3 points (green) -->
    <g fill="#16A34A" stroke="#FFFFFF" stroke-width="1.5">
      <circle cx="350" cy="210" r="6"/>
      <circle cx="383" cy="196" r="6"/>
      <circle cx="416" cy="205" r="6"/>
      <circle cx="443" cy="198" r="6"/>
    </g>

    <!-- Phase labels (small, on top of each shaded band) -->
    <g font-family="Helvetica, Arial, sans-serif"
       font-size="14" font-weight="700"
       text-anchor="middle">
      <text x="129" y="143" fill="#0054AD" opacity="0.9">I</text>
      <text x="259" y="143" fill="#D97706" opacity="0.9">II</text>
      <text x="389" y="143" fill="#16A34A" opacity="0.9">III</text>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="259" y="450"
        text-anchor="middle"
        font-family="Helvetica, Arial, 'Source Sans 3', 'Source Sans Pro', sans-serif"
        font-weight="800"
        font-size="64"
        letter-spacing="-1.2"
        fill="#0054AD">shewhartr</text>
</svg>
